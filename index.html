<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Voice Assistant – Talk to our AI Agent</title>
  <meta name="description"
    content="Engage with our advanced AI voice agent in real-time. Ask questions about availability, pricing, and services instantly.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap');

    :root {
      --color-background-primary: #121212;
      --color-background-secondary: rgba(255, 255, 255, 0.04);
      --color-border-secondary: rgba(255, 255, 255, 0.12);
      --color-text-primary: #ffffff;
      --color-text-secondary: #9a9a9f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #121212;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'DM Sans', sans-serif;
      color: var(--color-text-primary);
    }

    .wrap {
      flex: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 60% 20%, #2f2f32 0%, #111112 70%);
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: #CECBF6;
      top: -150px;
      right: -100px;
      opacity: 0.15;
    }

    .orb2 {
      width: 350px;
      height: 350px;
      background: #9FE1CB;
      bottom: -100px;
      left: -80px;
      opacity: 0.1;
    }

    .badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--color-text-secondary);
      padding: 8px 18px;
      border-radius: 999px;
      margin-bottom: 1.75rem;
      backdrop-filter: blur(4px);
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      color: var(--color-text-primary);
      text-align: center;
      line-height: 1.15;
      max-width: 560px;
      margin-bottom: 1.5rem;
    }

    .sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--color-text-secondary);
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .talk-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 14px 28px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      outline: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .talk-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .talk-btn:active {
      transform: translateY(1px);
    }

    .talk-btn.active {
      background: rgba(239, 68, 68, 0.15);
      border-color: #EF4444;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
    }

    .talk-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .mic-icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pulse-ring {
      position: absolute;
      inset: -6px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      opacity: 0;
    }

    .talk-btn.active .pulse-ring {
      animation: pulse 1.4s ease-out infinite;
      border-color: rgba(239, 68, 68, 0.4);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }

      100% {
        transform: scale(1.35);
        opacity: 0;
      }
    }

    .status {
      margin-top: 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--color-text-secondary);
      min-height: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wave-bars {
      display: none;
      align-items: center;
      gap: 3px;
      height: 18px;
    }

    .wave-bars.visible {
      display: inline-flex;
    }

    .bar {
      width: 3px;
      background: #ffffff;
      border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite;
    }

    .bar:nth-child(1) {
      animation-delay: 0s;
      height: 6px;
    }

    .bar:nth-child(2) {
      animation-delay: 0.15s;
      height: 12px;
    }

    .bar:nth-child(3) {
      animation-delay: 0.3s;
      height: 8px;
    }

    .bar:nth-child(4) {
      animation-delay: 0.1s;
      height: 14px;
    }

    .bar:nth-child(5) {
      animation-delay: 0.25s;
      height: 6px;
    }

    @keyframes wave {

      0%,
      100% {
        transform: scaleY(1);
      }

      50% {
        transform: scaleY(1.8);
      }
    }

    .error-msg {
      color: #EF4444;
      font-size: 13px;
      margin-top: 0.75rem;
      text-align: center;
      max-width: 360px;
      display: none;
    }

    .passcode-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 280px;
      margin-top: 1rem;
      transition: all 0.4s ease;
    }

    .passcode-hint {
      font-size: 11px;
      color: var(--color-text-secondary);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .passcode-input-wrapper {
      display: flex;
      align-items: center;
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 4px 6px 4px 20px;
      transition: all 0.3s ease;
    }

    .passcode-input-wrapper:focus-within {
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
    }

    #passcodeInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      letter-spacing: 0.25em;
      width: 100%;
    }

    #passcodeInput::placeholder {
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.3);
    }

    .unlock-btn {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .unlock-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: scale(1.05);
    }

    .unlock-icon {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="wrap" role="main">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <h2 class="sr-only">AI voice agent demo page</h2>
    <span class="badge">AI-powered voice agent</span>
    <h1 class="headline">Talk to our<br>AI assistant</h1>
    <p class="sub">Ask anything — availability, services, pricing. Our AI is ready to help, right now.</p>

    <!-- Passcode Section -->
    <div class="passcode-box" id="passcodeBox">
      <p class="passcode-hint">Enter passcode to unlock demo</p>
      <div class="passcode-input-wrapper">
        <input type="password" id="passcodeInput" placeholder="••••" maxlength="12" aria-label="Demo passcode"
          onkeydown="if(event.key === 'Enter') verifyPasscode()">
        <button class="unlock-btn" onclick="verifyPasscode()" aria-label="Verify passcode">
          <svg viewBox="0 0 24 24" class="unlock-icon">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Talk Button -->
    <button class="talk-btn" id="talkBtn" onclick="toggleCall()" aria-label="Talk to our agent"
      style="display: none; opacity: 0; transition: opacity 0.3s ease;">
      <div class="pulse-ring"></div>
      <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="9" y="2" width="6" height="12" rx="3" />
        <path d="M5 10a7 7 0 0 0 14 0" />
        <line x1="12" y1="19" x2="12" y2="22" />
        <line x1="8" y1="22" x2="16" y2="22" />
      </svg>
      <span id="btnLabel">Talk to our agent</span>
    </button>

    <div class="status" id="statusArea">
      <span id="statusText">Tap to start</span>
      <div class="wave-bars" id="waveBars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/balacodeio/Vapi-Web-UMD@latest/dist/latest/vapi-web-bundle.min.js"></script>
  <script>
    let VAPI_PUBLIC_KEY = '';
    let ASSISTANT_ID = '';

    let vapi = null;
    let callActive = false;

    // Check if passcode is already verified and saved in sessionStorage
    async function checkSavedSession() {
      const savedPass = sessionStorage.getItem('demo_passcode');
      if (savedPass) {
        await fetchCredentials(savedPass, true);
      }
    }

    async function verifyPasscode() {
      const input = document.getElementById('passcodeInput');
      const passcode = input.value.trim();
      if (!passcode) {
        showError('Please enter a passcode');
        return;
      }
      await fetchCredentials(passcode, false);
    }

    async function fetchCredentials(passcode, isAutoLoad = false) {
      try {
        const response = await fetch(`/api/config?passcode=${encodeURIComponent(passcode)}`);
        const data = await response.json();

        if (response.ok && data.success) {
          VAPI_PUBLIC_KEY = data.publicKey;
          ASSISTANT_ID = data.assistantId;
          sessionStorage.setItem('demo_passcode', passcode);

          // Animate transition from passcode input to the mic talk button
          const passcodeBox = document.getElementById('passcodeBox');
          const talkBtn = document.getElementById('talkBtn');

          passcodeBox.style.opacity = '0';
          setTimeout(() => {
            passcodeBox.style.display = 'none';
            talkBtn.style.display = 'inline-flex';
            setTimeout(() => { talkBtn.style.opacity = '1'; }, 50);
          }, 300);
        } else {
          if (!isAutoLoad) {
            showError(data.message || 'Incorrect passcode');
            sessionStorage.removeItem('demo_passcode');
          }
        }
      } catch (e) {
        if (!isAutoLoad) {
          showError('Could not connect. Please try again.');
        }
      }
    }

    checkSavedSession();

    function setStatus(text, wave = false) {
      const statusText = document.getElementById('statusText');
      const waveBars = document.getElementById('waveBars');
      statusText.textContent = text;
      statusText.style.display = wave ? 'none' : 'inline';
      wave ? waveBars.classList.add('visible') : waveBars.classList.remove('visible');
    }

    function setBtn(active, label, disabled = false) {
      const btn = document.getElementById('talkBtn');
      const btnLabel = document.getElementById('btnLabel');
      active ? btn.classList.add('active') : btn.classList.remove('active');
      btnLabel.textContent = label;
      btn.disabled = disabled;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    async function toggleCall() {
      if (callActive) {
        if (vapi) vapi.stop();
        return;
      }

      if (VAPI_PUBLIC_KEY.includes('PASTE_YOUR') || ASSISTANT_ID.includes('PASTE_YOUR') || !VAPI_PUBLIC_KEY || !ASSISTANT_ID) {
        showError('Please paste your Vapi Public Key and Assistant ID in the script section!');
        return;
      }

      if (!vapi) {
        try {
          vapi = new Vapi(VAPI_PUBLIC_KEY);

          vapi.on('call-start', () => {
            callActive = true;
            setBtn(true, 'End call');
            setStatus('', true);
          });

          vapi.on('call-end', () => {
            callActive = false;
            setBtn(false, 'Talk to our agent');
            setStatus('Call ended');
            setTimeout(() => setStatus('Tap to start'), 2500);
          });

          vapi.on('error', (e) => {
            callActive = false;
            setBtn(false, 'Talk to our agent');
            setStatus('Tap to start');
            showError('Could not connect. Please try again.');
            console.error('Vapi error:', e);
          });

        } catch (e) {
          showError('Failed to initialize. Check your connection.');
          return;
        }
      }

      setBtn(false, 'Connecting...', true);
      setStatus('Connecting...');

      try {
        await vapi.start(ASSISTANT_ID);
      } catch (e) {
        setBtn(false, 'Talk to our agent', false);
        setStatus('Tap to start');
        showError('Could not start call. Please try again.');
        console.error(e);
      }
    }
  </script>
</body>

</html>
